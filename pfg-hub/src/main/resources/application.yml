spring:
  application:
    name: pfg-hub
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pfg}
    username: ${SPRING_DATASOURCE_USERNAME:pfg}
    password: ${SPRING_DATASOURCE_PASSWORD:pfg}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

pfg:
  github:
    token: ${GITHUB_TOKEN}
    crawl-cron: "0 0 */6 * * *"   # every 6 hours
  hub:
    runner-timeout-minutes: 30     # mark runner as offline after 30min without heartbeat
    issue-max-retries: 3           # abandon issue after 3 failed attempts
    issue-min-score: 60            # minimum score to enter the queue

logging:
  level:
    dev.promptforgood: INFO
    org.springframework.security: WARN
