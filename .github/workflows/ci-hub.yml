name: pfg-hub CI

on:
  push:
    paths:
      - 'pfg-hub/**'
    branches: [ main, develop ]
  pull_request:
    paths:
      - 'pfg-hub/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pfg-hub

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pfg_test
          POSTGRES_USER: pfg
          POSTGRES_PASSWORD: pfg
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('pfg-hub/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build and test
        run: ./gradlew build test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pfg_test
          SPRING_DATASOURCE_USERNAME: pfg
          SPRING_DATASOURCE_PASSWORD: pfg

      - name: ktlint check
        run: ./gradlew ktlintCheck
